version: '3.8'

services:
  # 1. PostgreSQL Database Service
  db:
    image: postgres:15-alpine
    container_name: rag_saas_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: rag_saas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # 2. FastAPI RAG Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag_saas_backend
    restart: always
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/rag_saas
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      JWT_SECRET: ${JWT_SECRET:-production-grade-jwt-secret-key-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-production-grade-refresh-token-secret-key-change-me}
    ports:
      - "8000:8000"
    volumes:
      # Mount storage directory for document and ChromaDB isolation persistence
      - ./storage:/backend/storage
    depends_on:
      db:
        condition: service_healthy

  # 3. Next.js Frontend Client Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    container_name: rag_saas_frontend
    restart: always
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
